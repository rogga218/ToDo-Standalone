[tool.pytest.ini_options]
pythonpath = ["."]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
addopts = "-v --cov=src --cov-fail-under=65 --cov-report=term-missing"
markers = [
    "gui: marks tests as GUI tests requiring Playwright (deselect with '-m \"not gui\"')"
]

[tool.coverage.run]
omit = ["src/main.py", "src/ui/routes.py"]

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = [
    "build\\.py$",
    "^dist/",
    "^build/",
    "^\\.venv/",
]
explicit_package_bases = true

[tool.ruff]
line-length = 120
target-version = "py313"
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = []
