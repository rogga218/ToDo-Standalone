services:
  app:
    build: .
    image: todov2_standalone
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./src:/app/src  # Hot reloading for code
      - ./tests:/app/tests # Tests
      - ./pyproject.toml:/app/pyproject.toml # Config
      - ./todo.db:/app/todo.db # Persist SQLite db
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - DATABASE_URL=sqlite:///todo.db
      - TZ=Europe/Stockholm
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

