services:
  app:
    build: .
    image: todov2_standalone
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./src:/app/src  # Hot reloading for code
      - ./tests:/app/tests # Tests
      - ./pyproject.toml:/app/pyproject.toml # Config
      - ./data:/app/data # Mount full directory for SQLite WAL mode compatibility
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - DATABASE_URL=sqlite:///data/todo.db
      - TZ=Europe/Stockholm
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').getcode() == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

